name: Furcast
options:
  bundleIdPrefix: com.shimondeitel.coatcond
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Furcast:
    type: application
    platform: iOS
    sources:
      - path: Furcast
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coatcond
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Furcast/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FurcastTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FurcastTests
      - path: Furcast.storekit
    dependencies:
      - target: Furcast
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coatcond.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FurcastUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FurcastUITests
    dependencies:
      - target: Furcast
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coatcond.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Furcast:
    build:
      targets:
        Furcast: all
        FurcastTests: [test]
        FurcastUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Furcast.storekit
    test:
      config: Debug
      storeKitConfiguration: Furcast.storekit
      targets:
        - FurcastTests
        - FurcastUITests
    archive:
      config: Release
